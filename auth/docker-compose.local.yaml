version: '3.8'

services:
  auth:
    build: .
    env_file:
      - .env
    ports:
      - "8012:8012"
    depends_on:
      - postgresql
    networks:
      - auth-local
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8012/health" ]
      interval: 30s
      timeout: 4s
      retries: 3
    restart: unless-stopped

  postgresql:
    image: postgres:15-alpine
    env_file:
      - .env
    ports:
      - "5432:5432"
    networks:
      - auth-local
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB" ]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s
    restart: unless-stopped

networks:
  auth-local:
    driver: bridge
