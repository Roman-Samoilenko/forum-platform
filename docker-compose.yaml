services:
  gateway:
    build:
      context: ./gateway
    container_name: forum-gateway
    ports:
      - "7000:7000"
    networks:
      - forum-network
    depends_on:
      auth:
        condition: service_healthy
      forum:
        condition: service_healthy
    restart: unless-stopped

  auth:
    build:
      context: ./auth
    container_name: forum-auth
    environment:
      - PSQL_HOST=postgres
      - PSQL_PORT=5432
      - PSQL_USER=postgres
      - PSQL_PASS=postgres
      - PSQL_NAME=authdb
      - JWT_SECRET=changeme
      - SERVER_PORT=8012
    networks:
      - forum-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8012/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

  forum:
    build:
      context: ./forum
      dockerfile: Dockerfile
    container_name: forum-backend
    environment:
      - MONGODB_URL=mongodb://admin:admin@mongodb:27017/forumdb?authSource=admin
      - DB_NAME=forumdb
    networks:
      - forum-network
    depends_on:
      mongodb:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s

    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: forum-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=authdb
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - forum-network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d authdb" ]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  mongodb:
    image: mongo:6.0
    container_name: forum-mongodb
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=admin
    volumes:
      - mongodb_data:/data/db
    networks:
      - forum-network
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  forum-network:
    driver: bridge

volumes:
  postgres_data:
  mongodb_data:
