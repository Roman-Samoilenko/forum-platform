<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AIR.forum{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">

</head>

<body>
    <div class="header">
        <div class="header-content">
            <a href="/" class="logo">AIR.forum</a>
            <div class="nav">
                <div class="nav-links">
                    <a href="/">Главная</a>
                    <a href="/forum/new-topic">Новая тема</a>
                    <a href="/forum/graph-stats">Статистика</a>
                </div>
                <div class="user-info">
                    Пользователь: <strong>{{ current_user }}</strong>
                </div>
            </div>
        </div>
    </div>

    <main>
        {% block content %}{% endblock %}
    </main>
</body>

</html>
