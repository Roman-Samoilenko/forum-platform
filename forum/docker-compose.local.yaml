version: '3.8'

services:
  forum:
    build: .
    ports:
      - "8000:8000"
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - forum-local

  mongodb:
    image: mongo:6.0
    container_name: mongodb-local
    ports:
      - "27017:27017"
    networks:
      - forum-local
    restart: unless-stopped
    env_file:
      - .env
    healthcheck:
      test: [ "CMD", "mongosh", "--eval", "db.adminCommand('ping')" ]
      interval: 10s
      timeout: 5s
      retries: 5

networks:
  forum-local:
    driver: bridge
